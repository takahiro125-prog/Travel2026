                var html_2ba73ac5f378d24d7449d6ae2c4a1f96 = $(`<div id="html_2ba73ac5f378d24d7449d6ae2c4a1f96" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-09 Natural History Museum of Utah</h4><table><tr><th>ID</th><td>02-09</td></tr><tr><th>Category</th><td>Must</td></tr><tr><th>Area</th><td>Salt Lake City, UT</td></tr><tr><th>Plan</th><td>Utahの自然史展示を見る。</td></tr><tr><th>Notes</th><td>Salt Lake Cityらしさが最も強く、Twin Falls既訪の場合のDay 2第一候補。暑さ回避にもよい。 / 到着遅延時は展示時間を短縮し、閉館にかかる場合は訪問時刻を変更。 / 公式: 毎日10:00–17:00、水曜のみ21:00まで。最終入館は閉館30分前。8/1は土曜なので17:00閉館前提。2026-07-09ユーザー提供Google Maps pinで座標更新: 40.7641297, -111.8226881。 / Natural History Museum of Utahは、これから訪れるUtahの景観を地質・生物・人類史の時間軸で予習できる博物館です。Utahには海、砂漠、河川、湿地だった時代の地層が重なり、隆起と侵食によって現在のColorado Plateauや赤い岩の景観が露出しました。恐竜化石は、岩が単なる景色ではなく過去の環境を保存した記録であることを示します。Great Salt Lakeの展示では古代Lake Bonnevilleとの関係を、先住民文化の展示ではこの土地が無人の荒野ではなく長く人が暮らしてきた場所であることを確認できます。館内では、地層の年代、化石が見つかった環境、現在の景観とのつながりに注目すると、その後の旅全体が理解しやすくなります。</td></tr><tr><th>Time needed</th><td>90–120 min</td></tr><tr><th>Cost</th><td>Paid / reserve tickets recommended</td></tr><tr><th>Address</th><td>Natural History Museum of Utah — Salt Lake City, UT. Coordinate: 40.7641297, -111.8226881</td></tr></table><p><a href="https://maps.apple.com/?ll=40.7641297,-111.8226881&amp;q=Natural%20History%20Museum%20of%20Utah" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Natural+History+Museum+of+Utah+Salt+Lake+City" target="_blank">Google image search</a></p></div></div>`)[0];
