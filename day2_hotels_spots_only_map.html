                var html_ede56da5a7f7e8a4289190478e68e648 = $(`<div id="html_ede56da5a7f7e8a4289190478e68e648" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-09 Natural History Museum of Utah</h4><table><tr><th>Time needed</th><td>90–120 min</td></tr><tr><th>Walking / Effort</th><td>駐車→館0.1mi未満＋館内約0.7mi</td></tr><tr><th>What to do</th><td>Utahの自然史展示を見る。</td></tr><tr><th>GUIDE</th><td>Natural History Museum of Utahは、これから訪れるUtahの景観を地質・生物・人類史の時間軸で予習できる博物館です。Utahには海、砂漠、河川、湿地だった時代の地層が重なり、隆起と侵食によって現在のColorado Plateauや赤い岩の景観が露出しました。恐竜化石は、岩が単なる景色ではなく過去の環境を保存した記録であることを示します。Great Salt Lakeの展示では古代Lake Bonnevilleとの関係を、先住民文化の展示ではこの土地が無人の荒野ではなく長く人が暮らしてきた場所であることを確認できます。館内では、地層の年代、化石が見つかった環境、現在の景観とのつながりに注目すると、その後の旅全体が理解しやすくなります。</td></tr><tr><th>Cost</th><td>Paid / reserve tickets recommended</td></tr><tr><th>Address / Location</th><td>Natural History Museum of Utah — Salt Lake City, UT. Coordinate: 40.7641297, -111.8226881</td></tr></table><p><a href="https://maps.apple.com/?ll=40.7641297,-111.8226881&amp;q=Natural%20History%20Museum%20of%20Utah" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Natural+History+Museum+of+Utah+Salt+Lake+City" target="_blank">Google image search</a></p></div></div>`)[0];
