                var html_e4e8bbb7939687acfec4b9ca373ac44b = $(`<div id="html_e4e8bbb7939687acfec4b9ca373ac44b" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>11-07 Hanford Unit / Richland Visitor Center</h4><span class="popup-category" style="background:#d7191c">Must</span><table class="popup-primary"><tr><th>Time needed</th><td>45–90 min</td></tr><tr><th>What to do</th><td>Hanfordの歴史展示を見学する。</td></tr><tr><th>Skip / Shorten rule</th><td>帰着が遅れる場合は見学を最短化。</td></tr></table><div class="popup-actions"><a class="apple-button" href="https://maps.apple.com/?ll=46.2804,-119.2752&amp;q=Hanford%20Unit%20%2F%20Richland%20Visitor%20Center" target="_blank">Open in Apple Maps</a><a class="image-link" href="https://www.google.com/search?tbm=isch&amp;q=Manhattan+Project+National+Historical+Park+Hanford+Richland" target="_blank">Google image search</a></div><details class="popup-details" open><summary>Show details</summary><div class="popup-detail-body"><table><tr><th>Walking / Effort</th><td>駐車→館0.1mi未満＋館内約0.4mi</td></tr><tr><th>GUIDE</th><td>Hanford Unitでは、Columbia Riverの大量の冷却水、Grand Coulee Dam由来の電力、広い隔離地がplutonium生産施設の立地を可能にしたことを学びます。B Reactorではuraniumの核分裂で生じたplutonium-239を化学分離し、長崎に投下された原子爆弾へ供給しました。展示では、原子炉の仕組みだけでなく、秘密主義、労働者の被曝、先住民の伝統的利用地の喪失、戦後の環境浄化を合わせて見ると、科学技術の成果と責任を立体的に理解できます。</td></tr><tr><th>Cost</th><td>Free / museum conditions may vary</td></tr><tr><th>Address / Location</th><td>Hanford Unit / Richland Visitor Center — Manhattan Project National Historical Park. Coordinate: 46.2804, -119.2752</td></tr><tr><th>Notes</th><td>Junior Rangerあり。帰着時間を優先して短めに。 営業時間メモ(2026-07-06): 公式ページ抽出範囲では具体時刻を確認できず。Visitor Centerは2000 Logston Blvd, Richland。月曜訪問予定なので直前確認必須。</td></tr></table></div></details></div></div>`)[0];
