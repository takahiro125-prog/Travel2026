<script id="mobile-card-prototype-script">
(function(){
  var roadtripMap = map_f9af1816d771366bc0e822685cfdcfc3;
  var card = document.getElementById('mobile-spot-card');
  var cardContent = document.getElementById('mobile-spot-card-content');
  var closeButton = document.getElementById('mobile-spot-card-close');

  function phoneLayout(){
    return window.matchMedia('(max-width:720px)').matches;
  }

  function closeMobileCard(){
    card.classList.remove('open');
    card.setAttribute('aria-hidden','true');
    cardContent.innerHTML = '';
  }

  function showMobileCard(id, marker){
    var savedPopup = marker._roadtripSavedPopup;
    if (!savedPopup) return;
    var popupContent = savedPopup.getContent();
    cardContent.innerHTML = '';
    if (typeof popupContent === 'string') {
      cardContent.innerHTML = popupContent;
    } else if (popupContent && popupContent.cloneNode) {
      cardContent.appendChild(popupContent.cloneNode(true));
    }
    cardContent.querySelectorAll('.popup-details').forEach(function(details){
      details.removeAttribute('open');
    });
    card.classList.add('open');
    card.setAttribute('aria-hidden','false');
    window._activeSpotId = id;
  }

  function syncMarkerMode(){
    Object.keys(window._spotMarkerNames || {}).forEach(function(id){
      var marker = window[window._spotMarkerNames[id]];
      if (!marker) return;

      if (!marker._roadtripSavedPopup) marker._roadtripSavedPopup = marker.getPopup();
      if (!marker._roadtripSavedTooltip) marker._roadtripSavedTooltip = marker.getTooltip();

      if (!marker._roadtripMobileCardWired) {
        marker.on('click', function(){
          window._activeSpotId = id;
          if (phoneLayout()) showMobileCard(id, marker);
        });
        marker._roadtripMobileCardWired = true;
      }

      if (phoneLayout()) {
        if (marker.getPopup()) marker.unbindPopup();
        if (marker.getTooltip()) marker.unbindTooltip();
      } else {
        if (!marker.getPopup() && marker._roadtripSavedPopup) marker.bindPopup(marker._roadtripSavedPopup);
        if (!marker.getTooltip() && marker._roadtripSavedTooltip) marker.bindTooltip(marker._roadtripSavedTooltip);
      }
    });

    if (phoneLayout()) {
      roadtripMap.closePopup();
    } else {
      closeMobileCard();
    }
  }

  window.openSpotById = function(id, retry){
    if (!id || !window._spotMarkerNames || !window._spotMarkerNames[id]) return;
    var marker = window[window._spotMarkerNames[id]];
    if (!marker) {
      if ((retry || 0) < 10) {
        setTimeout(function(){ window.openSpotById(id, (retry || 0) + 1); }, 300);
      }
      return;
    }
    window._activeSpotId = id;
    if (phoneLayout()) {
      showMobileCard(id, marker);
    } else {
      marker.openPopup();
    }
    roadtripMap.setView(marker.getLatLng(), Math.max(roadtripMap.getZoom(), 10));
    if (window.location.hash !== '#' + encodeURIComponent(id)) {
      history.replaceState(null, '', '#' + encodeURIComponent(id));
    }
    toggleSpotPanel(false);
  };

  closeButton.addEventListener('click', closeMobileCard);
  document.getElementById('list-button').addEventListener('click', closeMobileCard);
  window.addEventListener('resize', syncMarkerMode);
  syncMarkerMode();
})();
</script>
