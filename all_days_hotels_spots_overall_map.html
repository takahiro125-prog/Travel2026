                var html_dea7503fec47647a25ce92725b5291c6 = $(`<div id="html_dea7503fec47647a25ce92725b5291c6" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-05 Bonneville Salt Flats / Salt Flats Rest Area</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Bonneville Salt Flats / Wendover, UT</td></tr> <tr><th>Time</th><td>30–45 min + detour</td></tr> <tr><th>Effort</th><td>休憩所または入口付近から短い歩行。塩が靴につく。イベント中は奥へ入らない前提。</td></tr> <tr><th>Plan</th><td>白い塩原を短時間で見る。Salt Flats Rest AreaまたはSpeedway入口付近で写真休憩にする。</td></tr> <tr><th>Why</th><td>Baker City→Sandyの行きで、塩原景観を入れる候補。Bonnevilleが今回の旅程では最も塩原らしい。</td></tr> <tr><th>Guide</th><td>Bonneville Salt Flatsは、かつてこの地域を覆っていた巨大なLake Bonnevilleが干上がり、塩分が平らに残った場所です。白く広い地面は雪のように見えますが、実際は塩でできた硬い平面です。20世紀以降は、非常に平らな地形を利用して land speed record の舞台にもなりました。子どもには「大昔の湖がなくなって、塩だけが白い地面として残った場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>出発が遅い、疲労が強い、Speed Week規制が強い、またはSandy到着が遅れそうなら省略。困難な場合は帰りで検討</td></tr> <tr><th>Cost</th><td>Free</td></tr> <tr><th>Notes</th><td>2026-08-01はSpeed Week期間中のため、自由に奥へ入る観光ではなく短時間の写真休憩扱い。濡れている場所へ車で入らない。</td></tr> <tr><th>Address</th><td>Bonneville Salt Flats Rest Area, I-80, Wendover, UT 84083（番地なし / rest area）</td></tr> <tr><th>Days</th><td>Day 2</td></tr><tr><th>Day maps</th><td><a href="day2_hotels_spots_only_map.html#02-05">Day 2 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Bonneville%20Salt%20Flats%20Rest%20Area%20UT" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Bonneville+Salt+Flats+Utah" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_b36ad49e97185c4e3c8f0b51d83be1e8 = $(`<div id="html_b36ad49e97185c4e3c8f0b51d83be1e8" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>03-07 Arches Visitor Center</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Arches National Park</td></tr> <tr><th>Time</th><td>15–30 min</td></tr> <tr><th>Effort</th><td>軽い。トイレ・水・地図・Junior Ranger向き。</td></tr> <tr><th>Plan</th><td>入園時または観光前に、トイレ・水・地図・Junior Ranger bookletを確認する。</td></tr> <tr><th>Why</th><td>Arches観光前に安全確認と水補給ができる。Junior Rangerの起点にもなる。</td></tr> <tr><th>Guide</th><td>Arches National Parkは、自然の石のアーチが非常に高密度で集まる公園です。地下の塩の層が岩を押し上げ、割れ目に水が入り、砂岩の壁が少しずつ削られてアーチができます。Visitor Centerでは、これから見るアーチが単なる穴ではなく、長い時間をかけてできた壊れやすい地形だと理解しておくとよいです。子どもには「岩がゆっくり割れて、削られて、窓みたいな形になった」と説明できます。</td></tr> <tr><th>Skip rule</th><td>到着が遅い場合はトイレ・水だけ。閉館後なら園内観光を優先。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>Junior Ranger対象。必要ならここでbookletを入手。 営業時間メモ(2026-07-06): 公園は通常24時間・年中開園。Visitor Centerはopen daily。具体時刻は公式ページ抽出範囲では確認できず、booklet / badge対応は直前確認。</td></tr> <tr><th>Address</th><td>2282 Resource Blvd, Moab, UT 84532</td></tr> <tr><th>Days</th><td>Day 3</td></tr><tr><th>Day maps</th><td><a href="day3_hotels_spots_only_map.html#03-07">Day 3 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Arches%20Visitor%20Center%20Moab%20UT" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Arches+Visitor+Center" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_fe9209362f33b9373ed96d9357d7f09b = $(`<div id="html_fe9209362f33b9373ed96d9357d7f09b" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>03-10 Balanced Rock</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Arches National Park</td></tr> <tr><th>Time</th><td>10–20 min</td></tr> <tr><th>Effort</th><td>車窓でも可。短いループは体力次第。</td></tr> <tr><th>Plan</th><td>入園後または帰りに短時間で写真休憩。</td></tr> <tr><th>Why</th><td>道路から見え、短時間でArchesらしい景観を見られる。</td></tr> <tr><th>Guide</th><td>Balanced Rockは、硬い岩が柔らかい岩の上に残ったことで、巨大な岩が台座の上に乗っているように見える地形です。実際には完全に別の岩が置かれているわけではなく、下の層が速く削られ、上の層が残った結果です。いつかは崩れるため、今の形は地質学的には一時的な状態です。子どもには「下だけ先に削られて、上の大きな岩が残った」と説明できます。</td></tr> <tr><th>Skip rule</th><td>疲れていれば車窓または展望だけでよい。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>夕方は色がよい。長居しない。</td></tr> <tr><th>Address</th><td>Arches Scenic Dr, Moab, UT 84532 / Balanced Rock（番地なし）</td></tr> <tr><th>Days</th><td>Day 3</td></tr><tr><th>Day maps</th><td><a href="day3_hotels_spots_only_map.html#03-10">Day 3 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Balanced%20Rock%20Arches%20National%20Park%20Arches%20Scenic%20Dr%2C%20Moab%2C%20UT%2084532%20/%20Balanced%20Rock%EF%BC%88%E7%95%AA%E5%9C%B0%E3%81%AA%E3%81%97%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Balanced+Rock+Arches+National+Park" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_fcc89e1d8c5e122b195e5e2ffdf619a0 = $(`<div id="html_fcc89e1d8c5e122b195e5e2ffdf619a0" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>06-01 Horseshoe Bend</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Page / Glen Canyon</td></tr> <tr><th>Time</th><td>45–75 min</td></tr> <tr><th>Effort</th><td>往復約1.5 miles。日陰少ない。崖の縁で子供注意。</td></tr> <tr><th>Plan</th><td>朝にColorado Riverの大きな湾曲を展望する。</td></tr> <tr><th>Why</th><td>Page周辺で最も外しにくい景観。Grand Canyonへ向かう前に入れやすい。</td></tr> <tr><th>Guide</th><td>Horseshoe Bendは、Colorado Riverが馬蹄形に大きく曲がる場所を崖の上から見る展望地です。川は横に曲がりながら流れていましたが、Colorado Plateauが隆起した後、川が同じ場所を下へ深く削り続けたため、現在の深い曲線になりました。写真では平面的に見えますが、実際には川まで大きな高低差があります。子どもには「曲がった川が、そのまま下へ深く掘っていった場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>暑い、混雑、子供の安全管理が難しい場合は滞在を短縮。崖の縁に近づきすぎない。</td></tr> <tr><th>Cost</th><td>City parking fee / Annual Pass対象外</td></tr> <tr><th>Notes</th><td>朝推奨。水・帽子必須。</td></tr> <tr><th>Address</th><td>1001 Page Parkway, Page, AZ 86040（Horseshoe Bend parking）</td></tr> <tr><th>Days</th><td>Day 6</td></tr><tr><th>Day maps</th><td><a href="day6_hotels_spots_only_map.html#06-01">Day 6 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Horseshoe%20Bend%20Page%20/%20Glen%20Canyon%201001%20Page%20Parkway%2C%20Page%2C%20AZ%2086040%EF%BC%88Horseshoe%20Bend%20parking%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Horseshoe+Bend+Page+Arizona" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_39bf11ffde58323cdfd5d7c48dae34e3 = $(`<div id="html_39bf11ffde58323cdfd5d7c48dae34e3" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>06-04 Carl Hayden Visitor Center / Glen Canyon Dam Bridge</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Page / Glen Canyon</td></tr> <tr><th>Time</th><td>45–60 min</td></tr> <tr><th>Effort</th><td>軽い。屋内展示・Junior Ranger提出・橋の展望。</td></tr> <tr><th>Plan</th><td>Horseshoe Bend後、Carl Hayden Visitor CenterでGlen Canyon Junior Ranger bookletを提出し、badgeを受け取る。Glen Canyon Dam Bridgeも短時間見る。</td></tr> <tr><th>Why</th><td>Glen Canyon Junior Ranger badgeを取得するための必須立ち寄り。子供にダム、Colorado River、Lake Powell、水利用を説明しやすい。</td></tr> <tr><th>Guide</th><td>Carl Hayden Visitor CenterとGlen Canyon Dam Bridge周辺では、Colorado Riverをせき止める巨大ダムを近くで見られます。Glen Canyon DamはLake Powellを作り、発電と水資源管理に大きな役割を持ちます。一方で、川の流れや峡谷の環境を大きく変えた構造物でもあります。子どもには「川を止めて湖を作り、電気も作る大きなダムを見る場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>Visitor Centerが閉館、badge受付不可、またはGrand Canyonへの出発が大幅に遅れる場合のみ短縮。</td></tr> <tr><th>Cost</th><td>Free / 要確認</td></tr> <tr><th>Notes</th><td>Junior Ranger badge目的でMust。営業時間メモ(2026-07-06): 公式ページ抽出範囲では具体時刻を確認できず。badge対応は直前確認。</td></tr> <tr><th>Address</th><td>691 Scenic View Dr, Page, AZ 86040</td></tr> <tr><th>Days</th><td>Day 6</td></tr><tr><th>Day maps</th><td><a href="day6_hotels_spots_only_map.html#06-04">Day 6 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Carl%20Hayden%20Visitor%20Center%20/%20Glen%20Canyon%20Dam%20Bridge%20Page%20/%20Glen%20Canyon%20691%20Scenic%20View%20Dr%2C%20Page%2C%20AZ%2086040" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Carl+Hayden+Visitor+Center+Glen+Canyon+Dam" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_2643733e09ba9e8fe3c0809a8c3d7736 = $(`<div id="html_2643733e09ba9e8fe3c0809a8c3d7736" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>06-11 Grandview Point</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Grand Canyon South Rim</td></tr> <tr><th>Time</th><td>20–30 min</td></tr> <tr><th>Effort</th><td>展望のみ。Trailは急なので歩かない。</td></tr> <tr><th>Plan</th><td>Desert View Drive上の強い展望を夕方に見る。</td></tr> <tr><th>Why</th><td>東西に広い眺めがあり、Day 6夕方の主展望に向く。</td></tr> <tr><th>Guide</th><td>Grandview Pointは、South Rim東側の展望地で、名前の通り広い視界が得られます。ここから下へ続くGrandview Trailは昔の鉱山道に由来しますが、今回見るべきなのは展望台からの地層と谷の広がりです。Grand Canyonでは、硬い層が崖になり、柔らかい層が斜面になって、階段状の景色を作っています。子どもには「岩の層が巨大な階段みたいに見える場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>Trailには入らない。時間が押す場合は写真だけで短縮。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>Day 6夕方の中核。</td></tr> <tr><th>Address</th><td>Grandview Point, Desert View Dr, Grand Canyon, AZ 86023（番地なし）</td></tr> <tr><th>Days</th><td>Day 6</td></tr><tr><th>Day maps</th><td><a href="day6_hotels_spots_only_map.html#06-11">Day 6 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Grandview%20Point%20Grand%20Canyon%20South%20Rim%20Grandview%20Point%2C%20Desert%20View%20Dr%2C%20Grand%20Canyon%2C%20AZ%2086023%EF%BC%88%E7%95%AA%E5%9C%B0%E3%81%AA%E3%81%97%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Grandview+Point+Grand+Canyon" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_5b747428c8f4adeae3f7dfd6b63f935c = $(`<div id="html_5b747428c8f4adeae3f7dfd6b63f935c" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>06-13 Grand Canyon Visitor Center / Mather Point area</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Grand Canyon South Rim</td></tr> <tr><th>Time</th><td>30–60 min</td></tr> <tr><th>Effort</th><td>軽い。駐車・トイレ・水・Junior Ranger向き。Mather Pointへ短時間で行ける。</td></tr> <tr><th>Plan</th><td>Visitor Centerで地図・Junior Rangerを確認し、必要ならMather Point周辺を短時間見る。</td></tr> <tr><th>Why</th><td>South Rimの情報拠点。夕方の展望と翌朝の動線を整理しやすい。</td></tr> <tr><th>Guide</th><td>Grand Canyon Visitor CenterとMather Point周辺は、South Rimで最も分かりやすい導入地点です。Grand CanyonはColorado Riverが大地を削った峡谷ですが、見えている岩の層は川よりはるかに古く、地球の長い時間を示しています。最初にここで全体像を見ると、翌朝や夕方に見る景色の意味が分かりやすくなります。子どもには「川が作った大きな谷で、壁には昔の地球の層が見えている」と説明できます。</td></tr> <tr><th>Skip rule</th><td>到着が遅い場合はトイレ・Junior Ranger確認だけに短縮し、Yavapaiへ進む。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>Junior Ranger対象。Mather Point sunriseとは別に、情報拠点として追加。 営業時間メモ(2026-07-06): 公式 Summer 2026: Grand Canyon Visitor Center daily 8:00–16:00。向かいのPark Storeはdaily 8:00–20:00でJunior Ranger books/badgesあり。Verkamp’s Visitor Centerもdaily 8:00–20:00。</td></tr> <tr><th>Address</th><td>Grand Canyon Visitor Center / Mather Point, S Entrance Rd, Grand Canyon Village, AZ 86023（番地なし）</td></tr> <tr><th>Days</th><td>Day 6</td></tr><tr><th>Day maps</th><td><a href="day6_hotels_spots_only_map.html#06-13">Day 6 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Grand%20Canyon%20Visitor%20Center%20Mather%20Point" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Grand+Canyon+Visitor+Center+Mather+Point" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_4a6287d097eec540ddb43faae9b08463 = $(`<div id="html_4a6287d097eec540ddb43faae9b08463" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>06-15 Yavapai Point / Yavapai Geology Museum</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Grand Canyon South Rim</td></tr> <tr><th>Time</th><td>45–75 min</td></tr> <tr><th>Effort</th><td>軽い。展望と屋内展示。夕方の締めに向く。</td></tr> <tr><th>Plan</th><td>Village側に近い場所で夕方から日没を見て、必要ならGeology Museumで地形を確認。</td></tr> <tr><th>Why</th><td>宿に戻りやすく、夕方の光と説明しやすさのバランスがよい。</td></tr> <tr><th>Guide</th><td>Yavapai PointとYavapai Geology Museumは、Grand Canyonの地形を理解するのに最も向いた場所の一つです。峡谷の景色と地質展示をつなげて見られるため、ただ大きいだけでなく、どの岩の層がどの時代にできたかを考えられます。夕方の光では、岩の層の色の違いが見えやすくなります。子どもには「景色を見ながら、岩の層の年齢を学べる場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>混雑時はMather Pointへ切替。Museum閉館後なら展望だけ。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>Day 6夕方の最終候補。</td></tr> <tr><th>Address</th><td>Yavapai Point Rd, Grand Canyon Village, AZ 86023（番地なし）</td></tr> <tr><th>Days</th><td>Day 6</td></tr><tr><th>Day maps</th><td><a href="day6_hotels_spots_only_map.html#06-15">Day 6 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Yavapai%20Point%20/%20Yavapai%20Geology%20Museum%20Grand%20Canyon%20South%20Rim%20Yavapai%20Point%20Rd%2C%20Grand%20Canyon%20Village%2C%20AZ%2086023%EF%BC%88%E7%95%AA%E5%9C%B0%E3%81%AA%E3%81%97%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Yavapai+Point+Grand+Canyon+Geology+Museum" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_5338f43a66fef06a7e9325e9450b4ec2 = $(`<div id="html_5338f43a66fef06a7e9325e9450b4ec2" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>07-01 Mather Point sunrise</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Grand Canyon South Rim</td></tr> <tr><th>Time</th><td>45–60 min</td></tr> <tr><th>Effort</th><td>軽い。車に戻りやすい。朝は寒暖差に注意。</td></tr> <tr><th>Plan</th><td>朝日を見て、短時間で出発準備をし、そのままSedonaへ向かう。</td></tr> <tr><th>Why</th><td>アクセスが読みやすく、Day 7の長距離移動前に最も現実的な朝日候補。</td></tr> <tr><th>Guide</th><td>Mather Pointは、South Rimで朝日を見る定番地点の一つです。朝の低い光が峡谷の片側を照らし、反対側に影を残すため、昼間よりも谷の深さが分かりやすくなります。Grand Canyonは広すぎて距離感がつかみにくいので、朝の影を使って地形の凹凸を見るとよいです。子どもには「朝の光で、谷の深さが見えやすくなる場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>起床が遅れた場合は短時間展望だけ。Sedonaへの出発を優先。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>朝日20–30分前到着を目安。</td></tr> <tr><th>Address</th><td>Mather Point, S Entrance Rd, Grand Canyon Village, AZ 86023（番地なし）</td></tr> <tr><th>Days</th><td>Day 7</td></tr><tr><th>Day maps</th><td><a href="day7_hotels_spots_only_map.html#07-01">Day 7 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Mather%20Point%20sunrise%20Grand%20Canyon%20South%20Rim%20Mather%20Point%2C%20S%20Entrance%20Rd%2C%20Grand%20Canyon%20Village%2C%20AZ%2086023%EF%BC%88%E7%95%AA%E5%9C%B0%E3%81%AA%E3%81%97%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Mather+Point+sunrise+Grand+Canyon" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_61ef8bbaede6f33abfe1dbd33c9ab4ac = $(`<div id="html_61ef8bbaede6f33abfe1dbd33c9ab4ac" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>10-08 Hagerman Fossil Beds National Monument / Thousand Springs Visitor Center</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Must</td></tr> <tr><th>Area</th><td>Hagerman Fossil Beds National Monument</td></tr> <tr><th>Time</th><td>45–90 min</td></tr> <tr><th>Effort</th><td>軽い。屋内展示中心。子供向き。</td></tr> <tr><th>Plan</th><td>化石・古生物・Hagerman horseについて学ぶ。</td></tr> <tr><th>Why</th><td>子供には分かりやすい。Minidokaとどちらか一つに絞る候補。</td></tr> <tr><th>Guide</th><td>Hagerman Fossil Bedsは、約400万〜300万年前のPlioceneの化石を多く保存する場所です。現在の乾いたIdahoの景色とは違い、当時は湿地、森林、草地が広がり、馬、ビーバー、鳥、mastodon、saber-toothed catなど多様な動物がいました。特にHagerman Horseの化石で有名で、現代の馬の歴史を考える入口になります。子どもには「昔のIdahoには、今と違う動物がたくさんいたことを化石で見る場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>Minidokaを優先する場合、または時間不足なら省略。</td></tr> <tr><th>Cost</th><td>Free</td></tr> <tr><th>Notes</th><td>Minidokaとの二択。Junior Rangerは現地確認。 営業時間メモ(2026-07-06): Idaho Parks公式: Thousand Springs State Park Visitor Centerは夏期(May 21開始) 7 days/week 9:00–17:00。Hagerman Fossil Beds NMとの共用Visitor Center。</td></tr> <tr><th>Address</th><td>Thousand Springs Visitor Center, 17970 US-30, Hagerman, ID 83332</td></tr> <tr><th>Days</th><td>Day 10</td></tr><tr><th>Day maps</th><td><a href="day10_hotels_spots_only_map.html#10-08">Day 10 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Hagerman%20Fossil%20Beds%20National%20Monument%20/%20Thousand%20Springs%20Visitor%20Center%20Hagerman%20Fossil%20Beds%20National%20Monument%20Thousand%20Springs%20Visitor%20Center%2C%2017970%20US-30%2C%20Hagerman%2C%20ID%2083332" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Hagerman+Fossil+Beds+National+Monument" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_b0f6594219cddd4c567ae0dc95ec528f = $(`<div id="html_b0f6594219cddd4c567ae0dc95ec528f" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-06 Great Salt Lake State Park</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Possibly</td></tr> <tr><th>Area</th><td>Salt Lake City / Great Salt Lake</td></tr> <tr><th>Time</th><td>45–90 min + detour</td></tr> <tr><th>Effort</th><td>湖岸・ビジターセンター中心。暑さ、風、虫、においに注意。</td></tr> <tr><th>Plan</th><td>Great Salt Lakeの湖岸と塩湖の景色を見る。時間があればビジターセンターで短時間学習。</td></tr> <tr><th>Why</th><td>Salt Lake Cityらしい自然景観を直接見られる。Antelope Islandより短時間で入れやすい可能性がある。</td></tr> <tr><th>Guide</th><td>Great Salt Lakeは海につながらない terminal lake で、水が出ていく川がないため塩分が濃くなっています。湖水は蒸発しますが、塩分は残るため、海水よりずっと塩辛い湖になります。湖はbrine shrimpや渡り鳥にとって重要ですが、水位低下も大きな問題になっています。子どもには「水は蒸発してなくなるけれど、塩は残るから、どんどんしょっぱい湖になる」と説明できます。</td></tr> <tr><th>Skip rule</th><td>Sandy到着が遅れそう、暑さ・虫・風が強い、NHMUを優先する場合は省略。</td></tr> <tr><th>Cost</th><td>State park fee / conditions check</td></tr> <tr><th>Notes</th><td>Day 2の追加候補。博物館と両方入れると重いので、入れるならNHMUなどと二択。</td></tr> <tr><th>Address</th><td>13312 W 1075 S, Magna, UT 84044</td></tr> <tr><th>Days</th><td>Day 2</td></tr><tr><th>Day maps</th><td><a href="day2_hotels_spots_only_map.html#02-06">Day 2 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Great%20Salt%20Lake%20State%20Park%20UT" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Great+Salt+Lake+State+Park" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_61cbca7bbeae9aeb27c839fea344e660 = $(`<div id="html_61cbca7bbeae9aeb27c839fea344e660" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-09 Natural History Museum of Utah</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Possibly</td></tr> <tr><th>Area</th><td>Salt Lake City, UT</td></tr> <tr><th>Time</th><td>90–120 min</td></tr> <tr><th>Effort</th><td>屋内中心。恐竜・地質・鉱物・Great Salt Lakeなど。子供向き。</td></tr> <tr><th>Plan</th><td>Utahの自然史展示を短時間で見る。Sandy到着前またはチェックイン前後に組み込む。</td></tr> <tr><th>Why</th><td>Salt Lake Cityらしさが最も強く、Twin Falls既訪の場合のDay 2第一候補。暑さ回避にもよい。</td></tr> <tr><th>Guide</th><td>Natural History Museum of Utahは、Utahの地質、恐竜、鉱物、Great Salt Lake、先住民文化をまとめて学べる博物館です。これから向かう赤い岩の国や塩湖の景色は、ここで背景を見ておくと理解しやすくなります。特に恐竜化石と岩石の展示は、Colorado Plateauが長い時間をかけてできた場所だと実感しやすいです。子どもには「Utahの恐竜、岩、湖、人の歴史を一気に予習できる場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>15:00以降にSalt Lake到着、疲労が強い、または夕食・チェックインを優先する場合は省略。</td></tr> <tr><th>Cost</th><td>Paid / reserve tickets recommended</td></tr> <tr><th>Notes</th><td>公式: 毎日10:00–17:00、水曜のみ21:00まで。最終入館は閉館30分前。8/1は土曜なので17:00閉館前提。</td></tr> <tr><th>Address</th><td>301 Wakara Way, Salt Lake City, UT 84108</td></tr> <tr><th>Days</th><td>Day 2</td></tr><tr><th>Day maps</th><td><a href="day2_hotels_spots_only_map.html#02-09">Day 2 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Natural%20History%20Museum%20of%20Utah%20Salt%20Lake%20City%20UT" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Natural+History+Museum+of+Utah+Salt+Lake+City" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_593e17cb2e7e90c1bfa416be2e4bba54 = $(`<div id="html_593e17cb2e7e90c1bfa416be2e4bba54" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>09-13 Zion-Mount Carmel Highway / Tunnel drive</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Possibly</td></tr> <tr><th>Area</th><td>Zion National Park</td></tr> <tr><th>Time</th><td>車窓 + 短時間</td></tr> <tr><th>Effort</th><td>車移動中心。トンネル・山道。</td></tr> <tr><th>Plan</th><td>時間があれば東側へ抜ける景観道路を車窓で見る。</td></tr> <tr><th>Why</th><td>車から見られる景色は良いが、Meadowへの動線として遠回りになり得る。</td></tr> <tr><th>Guide</th><td>Zion-Mount Carmel HighwayとTunnel driveは、Zion Canyonと公園東側を結ぶ景観道路です。トンネルを抜けると、メイン峡谷の垂直な壁とは違う、丸みを帯びたNavajo Sandstoneの丘や縞模様の岩が多く見えます。車窓だけでも、同じZionの中で景色が大きく変わることが分かります。子どもには「長いトンネルを抜けて、違う形の岩の世界に出る道」と説明できます。</td></tr> <tr><th>Skip rule</th><td>時間が押す場合は入れない。シャトル側観光を優先。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>午後移動との兼ね合いで判断。時間が押せば省略。</td></tr> <tr><th>Address</th><td>Zion-Mount Carmel Hwy, Springdale, UT 84767（番地なし）</td></tr> <tr><th>Days</th><td>Day 9</td></tr><tr><th>Day maps</th><td><a href="day9_hotels_spots_only_map.html#09-13">Day 9 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Zion-Mount%20Carmel%20Highway%20/%20Tunnel%20drive%20Zion%20National%20Park%20Zion-Mount%20Carmel%20Hwy%2C%20Springdale%2C%20UT%2084767%EF%BC%88%E7%95%AA%E5%9C%B0%E3%81%AA%E3%81%97%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Zion+Mount+Carmel+Highway+Tunnel" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_1cc11c94cf914670e0e9d68854c41efe = $(`<div id="html_1cc11c94cf914670e0e9d68854c41efe" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>09-14 Checkerboard Mesa</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Possibly</td></tr> <tr><th>Area</th><td>Zion National Park</td></tr> <tr><th>Time</th><td>10–20 min</td></tr> <tr><th>Effort</th><td>短時間展望。East Entrance側まで行く場合のみ。</td></tr> <tr><th>Plan</th><td>Zion東側まで抜ける場合に、模様のある岩山を写真で見る。</td></tr> <tr><th>Why</th><td>景色は特徴的だが、Day 9の主目的ではない。</td></tr> <tr><th>Guide</th><td>Checkerboard Mesaは、白っぽいNavajo Sandstoneに縦横の線が入り、碁盤の目のように見える岩山です。横の線は古い砂丘の層を示し、縦の割れ目は温度変化や風化でできた亀裂として理解できます。模様を観察すると、砂が積もって岩になり、その後に割れて削られた過程が分かります。子どもには「岩にチェック柄みたいな模様が自然にできた場所」と説明できます。</td></tr> <tr><th>Skip rule</th><td>Zion-Mount Carmel Highwayに行かない場合は省略。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>East Entrance側まで行く場合だけ。</td></tr> <tr><th>Address</th><td>Checkerboard Mesa, Zion-Mount Carmel Hwy, Springdale, UT 84767（番地なし）</td></tr> <tr><th>Days</th><td>Day 9</td></tr><tr><th>Day maps</th><td><a href="day9_hotels_spots_only_map.html#09-14">Day 9 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Checkerboard%20Mesa%20Zion%20National%20Park%20Checkerboard%20Mesa%2C%20Zion-Mount%20Carmel%20Hwy%2C%20Springdale%2C%20UT%2084767%EF%BC%88%E7%95%AA%E5%9C%B0%E3%81%AA%E3%81%97%EF%BC%89" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Checkerboard+Mesa+Zion" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_8852a78ed33312dd72c370fd3c5812dc = $(`<div id="html_8852a78ed33312dd72c370fd3c5812dc" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>09-15 Kolob Canyons / Timber Creek Overlook</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Possibly</td></tr> <tr><th>Area</th><td>Zion / I-15 northbound</td></tr> <tr><th>Time</th><td>45–90 min</td></tr> <tr><th>Effort</th><td>車移動 + 短い展望。開通状況確認。</td></tr> <tr><th>Plan</th><td>Meadowへ北上する途中で時間があれば、Zion北西部の景観を短時間で見る。</td></tr> <tr><th>Why</th><td>I-15北上動線と相性があるが、Zion Canyon後に追加するには重い可能性あり。</td></tr> <tr><th>Guide</th><td>Kolob Canyonsは、Zion National Parkの北西部にある比較的静かな地区です。メインのZion Canyonより人が少なく、赤い砂岩の峡谷と短い展望を車中心で見られます。I-15に近いため北上ルートとは相性がありますが、Zion Canyon本体を見た後に追加するには時間と体力の判断が必要です。子どもには「Zionの別の入口にある、少し静かな赤い峡谷」と説明できます。</td></tr> <tr><th>Skip rule</th><td>疲労、時間不足、閉鎖情報がある場合は省略。</td></tr> <tr><th>Cost</th><td>Annual Pass</td></tr> <tr><th>Notes</th><td>直前の道路状況を確認。疲労が強ければ省略。</td></tr> <tr><th>Address</th><td>Kolob Canyons Visitor Center, 3752 E Kolob Canyon Rd, New Harmony, UT 84757</td></tr> <tr><th>Days</th><td>Day 9</td></tr><tr><th>Day maps</th><td><a href="day9_hotels_spots_only_map.html#09-15">Day 9 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Kolob%20Canyons%20/%20Timber%20Creek%20Overlook%20Zion%20/%20I-15%20northbound%20Kolob%20Canyons%20Visitor%20Center%2C%203752%20E%20Kolob%20Canyon%20Rd%2C%20New%20Harmony%2C%20UT%2084757" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Kolob+Canyons+Timber+Creek+Overlook" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_fc56ee780fc5e83311fe23057b508071 = $(`<div id="html_fc56ee780fc5e83311fe23057b508071" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>09-16 Meadow Hot Spring</h4><table> <tr><th>Status</th><td>Ready</td></tr> <tr><th>Category</th><td>Possibly</td></tr> <tr><th>Area</th><td>Meadow, UT / Meadow Hot Spring</td></tr> <tr><th>Time</th><td>45–90 min</td></tr> <tr><th>Effort</th><td>未舗装路＋短い徒歩。自然の温泉プール。更衣室・トイレ・照明なし前提。岩・藻・泥で滑りやすく、子供は常時近くで監視。</td></tr> <tr><th>Plan</th><td>Meadow泊の日、宿にチェックイン後、明るいうちに短時間だけ温泉プールを下見・入浴する。水着、タオル、ウォーターシューズ、ライトを持つ。</td></tr> <tr><th>Why</th><td>Meadow泊の近くにある自然温泉で、Zion後の短いリラックス候補になる。宿周辺の星空候補とも相性があるが、温泉は安全のため日没前がよい。</td></tr> <tr><th>Guide</th><td>Meadow Hot Springはホテルや有料スパではなく、自然の温泉プールとして知られる場所。施設はない前提で、現地表示、私有地への配慮、ゴミ持ち帰りを徹底する。子どもには「地面から温かい水が湧いて、自然の丸いプールになっている場所」と説明できる。</td></tr> <tr><th>Skip rule</th><td>暗くなっている、疲労が強い、未舗装路がぬかるむ、駐車場所が不明、現地表示で立入制限がある、子供の安全管理が難しい場合は行かない。星空は宿周辺で代替。</td></tr> <tr><th>Cost</th><td>Free / access conditions may change</td></tr> <tr><th>Notes</th><td>2026-07-06追加。上書きせず末尾にappend。Day 9 Zion後のPossibly。自然温泉のため明るいうち・短時間・安全最優先。</td></tr> <tr><th>Address</th><td>Meadow Hot Spring, Meadow, UT 84644（番地なし / natural hot spring; Google Maps pinで確認）</td></tr> <tr><th>Days</th><td>Day 9</td></tr><tr><th>Day maps</th><td><a href="day9_hotels_spots_only_map.html#09-16">Day 9 map</a></td></tr></table><p class="links"><a href="https://maps.apple.com/?q=Meadow%20Hot%20Spring%20Utah" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Meadow+Hot+Spring+Utah" target="_blank">Google image search</a></p></div></div>`)[0];
