                var html_a770ea48524202d306fba6f943f8246e = $(`<div id="html_a770ea48524202d306fba6f943f8246e" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>04-14 Mesa Verde Visitor and Research Center</h4><table><tr><th>ID</th><td>04-14</td></tr><tr><th>Category</th><td>Must</td></tr><tr><th>Area</th><td>Mesa Verde National Park</td></tr><tr><th>Plan</th><td>入園前後に短時間で情報確認。必要ならJunior Ranger bookletを入手。</td></tr><tr><th>Notes</th><td>Mesa Verdeは公園内移動が長いので、最初に地図と時間感覚を確認する価値がある。 / 時間が押していればトイレ・水だけに短縮。 / Day 4は長いので長居しない。営業時間メモ(2026-07-06): 公式ページ表記ではVisitor &amp; Research Center 8:30–16:00 daily。ただし該当行は2024表記のため、2026訪問前に直前確認。2026-07-08ユーザー提供Google Maps pinと一致確認: 37.3357516, -108.4079164。 / Mesa Verdeは、自然景観を見る国立公園というより、Ancestral Puebloの人々が暮らした場所を学ぶ公園です。1906年に文化遺産を守る目的で国立公園になり、多数の遺跡とcliff dwellingを保護しています。Visitor and Research Centerでは、これから見る建物が廃墟ではなく、乾燥地で水、食料、日陰、防御を考えながら作られた生活空間だったと理解しておくとよいです。子どもには「昔の人が崖の下に町を作った理由を考える場所」と説明できます。</td></tr><tr><th>Time needed</th><td>10–20 min</td></tr><tr><th>Cost</th><td>Annual Pass</td></tr><tr><th>Address</th><td>Mesa Verde Visitor and Research Center, Mesa Verde National Park, CO 81330（Google Maps pin）</td></tr></table><p><a href="https://maps.apple.com/?ll=37.3357516,-108.4079164&amp;q=Mesa%20Verde%20Visitor%20and%20Research%20Center" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Mesa+Verde+Visitor+and+Research+Center" target="_blank">Google image search</a></p></div></div>`)[0];
