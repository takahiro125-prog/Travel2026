                var html_63aa5e3d7f7c7169c677fe177b60fe96 = $(`<div id="html_63aa5e3d7f7c7169c677fe177b60fe96" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-05 Bonneville Salt Flats / Salt Flats Rest Area Westbound</h4><table><tr><th>ID</th><td>02-05</td></tr><tr><th>Category</th><td>Must</td></tr><tr><th>Area</th><td>Bonneville Salt Flats / Wendover, UT</td></tr><tr><th>Plan</th><td>白い塩原を見て写真を撮る。</td></tr><tr><th>Notes</th><td>Baker City→Sandyの行きで、塩原景観を入れる候補。Bonnevilleが今回の旅程では最も塩原らしい。 / 往路が困難なら帰路へ移す。規制・安全上不可時のみ入口展望で代替。 / 2026-08-01はSpeed Week期間中のため、自由に奥へ入る観光ではなく短時間の写真休憩扱い。濡れている場所へ車で入らない。2026-07-09ユーザー提供Google Maps pinでSalt Flats Rest Area Westbound座標を更新: 40.7405333, -113.8518194。URL内にはBonneville Salt Flats本体座標も含まれるが、表示対象はRest Area Westbound側。 / Bonneville Salt Flatsは、氷河期にUtah西部を広く覆っていた巨大なLake Bonnevilleの名残です。湖が乾燥すると、水に溶けていた塩類が低地に残り、非常に平らな白い地表を作りました。現在のGreat Salt Lakeも同じ古代湖の残存部分です。表面には薄い塩の地殻があり、地下には湿った泥があるため、乾いて見えても車が沈むことがあります。20世紀には平坦さを利用して自動車の最高速度記録が競われました。見るときは、雪のような白さ、地平線まで続く平坦さ、周囲の山との標高差に注目すると、かつての湖底だったことを実感できます。</td></tr><tr><th>Time needed</th><td>30–45 min + detour</td></tr><tr><th>Cost</th><td>Free</td></tr><tr><th>Address</th><td>Bonneville Salt Flats / Salt Flats Rest Area Westbound — Bonneville Salt Flats / Wendover, UT. Coordinate: 40.7405333, -113.8518194</td></tr></table><p><a href="https://maps.apple.com/?ll=40.7405333,-113.8518194&amp;q=Salt%20Flats%20Rest%20Area%20Westbound" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Bonneville+Salt+Flats+Utah" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_342c11bb7223646fe06ea4f8d5892d96 = $(`<div id="html_342c11bb7223646fe06ea4f8d5892d96" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-09 Natural History Museum of Utah</h4><table><tr><th>ID</th><td>02-09</td></tr><tr><th>Category</th><td>Must</td></tr><tr><th>Area</th><td>Salt Lake City, UT</td></tr><tr><th>Plan</th><td>Utahの自然史展示を見る。</td></tr><tr><th>Notes</th><td>Salt Lake Cityらしさが最も強く、Twin Falls既訪の場合のDay 2第一候補。暑さ回避にもよい。 / 到着遅延時は展示時間を短縮し、閉館にかかる場合は訪問時刻を変更。 / 公式: 毎日10:00–17:00、水曜のみ21:00まで。最終入館は閉館30分前。8/1は土曜なので17:00閉館前提。2026-07-09ユーザー提供Google Maps pinで座標更新: 40.7641297, -111.8226881。 / Natural History Museum of Utahは、これから訪れるUtahの景観を地質・生物・人類史の時間軸で予習できる博物館です。Utahには海、砂漠、河川、湿地だった時代の地層が重なり、隆起と侵食によって現在のColorado Plateauや赤い岩の景観が露出しました。恐竜化石は、岩が単なる景色ではなく過去の環境を保存した記録であることを示します。Great Salt Lakeの展示では古代Lake Bonnevilleとの関係を、先住民文化の展示ではこの土地が無人の荒野ではなく長く人が暮らしてきた場所であることを確認できます。館内では、地層の年代、化石が見つかった環境、現在の景観とのつながりに注目すると、その後の旅全体が理解しやすくなります。</td></tr><tr><th>Time needed</th><td>90–120 min</td></tr><tr><th>Cost</th><td>Paid / reserve tickets recommended</td></tr><tr><th>Address</th><td>Natural History Museum of Utah — Salt Lake City, UT. Coordinate: 40.7641297, -111.8226881</td></tr></table><p><a href="https://maps.apple.com/?ll=40.7641297,-111.8226881&amp;q=Natural%20History%20Museum%20of%20Utah" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Natural+History+Museum+of+Utah+Salt+Lake+City" target="_blank">Google image search</a></p></div></div>`)[0];
