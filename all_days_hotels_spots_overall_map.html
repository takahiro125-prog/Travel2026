                var html_f682c6d2e174e2dd1a848488957c3dae = $(`<div id="html_f682c6d2e174e2dd1a848488957c3dae" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-05 Bonneville Salt Flats / Salt Flats Rest Area Westbound</h4><table><tr><th>Time needed</th><td>30–45 min + detour</td></tr><tr><th>Walking / Effort</th><td>駐車→塩原0.1mi未満／高低差ほぼ0</td></tr><tr><th>What to do</th><td>白い塩原を見て写真を撮る。</td></tr><tr><th>GUIDE</th><td>Bonneville Salt Flatsは、氷河期にUtah西部を広く覆っていた巨大なLake Bonnevilleの名残です。湖が乾燥すると、水に溶けていた塩類が低地に残り、非常に平らな白い地表を作りました。現在のGreat Salt Lakeも同じ古代湖の残存部分です。表面には薄い塩の地殻があり、地下には湿った泥があるため、乾いて見えても車が沈むことがあります。20世紀には平坦さを利用して自動車の最高速度記録が競われました。見るときは、雪のような白さ、地平線まで続く平坦さ、周囲の山との標高差に注目すると、かつての湖底だったことを実感できます。</td></tr><tr><th>Cost</th><td>Free</td></tr><tr><th>Address / Location</th><td>Bonneville Salt Flats / Salt Flats Rest Area Westbound — Bonneville Salt Flats / Wendover, UT. Coordinate: 40.7405333, -113.8518194</td></tr></table><p><a href="https://maps.apple.com/?ll=40.7405333,-113.8518194&amp;q=Salt%20Flats%20Rest%20Area%20Westbound" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Bonneville+Salt+Flats+Utah" target="_blank">Google image search</a></p></div></div>`)[0];

                var html_e2afa78789e64251b326a561ea088226 = $(`<div id="html_e2afa78789e64251b326a561ea088226" style="width: 100.0%; height: 100.0%;"><div class="popup"><h4>02-09 Natural History Museum of Utah</h4><table><tr><th>Time needed</th><td>90–120 min</td></tr><tr><th>Walking / Effort</th><td>駐車→館0.1mi未満＋館内約0.7mi</td></tr><tr><th>What to do</th><td>Utahの自然史展示を見る。</td></tr><tr><th>GUIDE</th><td>Natural History Museum of Utahは、これから訪れるUtahの景観を地質・生物・人類史の時間軸で予習できる博物館です。Utahには海、砂漠、河川、湿地だった時代の地層が重なり、隆起と侵食によって現在のColorado Plateauや赤い岩の景観が露出しました。恐竜化石は、岩が単なる景色ではなく過去の環境を保存した記録であることを示します。Great Salt Lakeの展示では古代Lake Bonnevilleとの関係を、先住民文化の展示ではこの土地が無人の荒野ではなく長く人が暮らしてきた場所であることを確認できます。館内では、地層の年代、化石が見つかった環境、現在の景観とのつながりに注目すると、その後の旅全体が理解しやすくなります。</td></tr><tr><th>Cost</th><td>Paid / reserve tickets recommended</td></tr><tr><th>Address / Location</th><td>Natural History Museum of Utah — Salt Lake City, UT. Coordinate: 40.7641297, -111.8226881</td></tr></table><p><a href="https://maps.apple.com/?ll=40.7641297,-111.8226881&amp;q=Natural%20History%20Museum%20of%20Utah" target="_blank">Open in Apple Maps</a><br><a href="https://www.google.com/search?tbm=isch&amp;q=Natural+History+Museum+of+Utah+Salt+Lake+City" target="_blank">Google image search</a></p></div></div>`)[0];
